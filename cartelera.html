<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M17LIV3 – Cartelera</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none !important; -webkit-user-select: none !important; }

  :root {
    --cyan: #00D4FF;
    --green: #39FF14;
    --dark: #060D18;
    --dark2: #0B1628;
    --card: #0E1D35;
    --text: #E8F4FF;
    --muted: #7AA3C8;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;

  }

  img {
    pointer-events: none;
    -webkit-user-drag: none;
  }

  header {
    width: 100%;
    background: var(--dark2);
    border-bottom: 1px solid rgba(0,212,255,0.2);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .logo-ring {
    position: relative;
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }

  .logo-ring svg { width: 100%; height: 100%; }

  .brand {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
  }

  .brand-name span { color: var(--cyan); }

  .brand-sub {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .main {
    width: 100%;
    max-width: 820px;
    padding: 32px 20px 60px;
    flex: 1;
  }

  .date-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .date-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--cyan);
    text-transform: uppercase;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(57,255,20,0.12);
    border: 1px solid rgba(57,255,20,0.4);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .cartelera-card {
    background: var(--card);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 16px;
    padding: 32px 28px;
    min-height: 260px;
    position: relative;
    overflow: hidden;
  }

  .cartelera-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--green));
  }

  .content-area {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;

  }

  .content-area.loading {
    color: var(--muted);
    font-style: italic;
  }

  .content-area.empty {
    color: var(--muted);
    font-size: 15px;
    text-align: center;
    padding: 40px 0;
  }

  .corner-accent {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 72px;
    font-weight: 700;
    color: rgba(0,212,255,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: rgba(122,163,200,0.5);
    letter-spacing: 1px;
  }

  .refresh-btn {
    background: none;
    border: 1px solid rgba(0,212,255,0.25);
    color: var(--muted);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .evento-card {
    background: linear-gradient(135deg, rgba(0,212,255,0.07), rgba(57,255,20,0.05));
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    display: none;
    position: relative;
  }

  .evento-card.visible { display: block; }

  .evento-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--green));
  }

  .evento-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(57,255,20,0.1));
    border-bottom: 1px solid rgba(0,212,255,0.2);
    width: 100%;
    padding: 10px 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
  }

  .evento-badge .star { color: var(--green); font-size: 13px; }

  .evento-img {
    width: 100%;
    max-height: 500px;
    object-fit: contain;
    display: block;
    background: #000;
  }

  .scroll-hint {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 10px 0 14px;
  }
  .scroll-hint.visible { display: flex; }
  .scroll-hint-text {
    font-size: 13px;
    color: var(--cyan);
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .cartelera-card { padding: 22px 18px; }
    .brand-name { font-size: 22px; }
    .content-area { font-size: 15px; }
    .evento-img { max-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-ring">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="22" stroke="#00D4FF" stroke-width="2.5" stroke-dasharray="8 4" stroke-linecap="round"/>
      <circle cx="26" cy="26" r="17" stroke="#39FF14" stroke-width="1.5" stroke-dasharray="5 6" stroke-linecap="round"/>
      <polygon points="21,19 35,26 21,33" fill="white"/>
    </svg>
  </div>
  <div class="brand">
    <div class="brand-name">M<span>1</span>7<span style="color:var(--green)">LIV3</span></div>
    <div class="brand-sub">Cartelera del día</div>
  </div>
</header>

<main class="main">
  <!-- Evento exclusivo del día -->
  <div class="scroll-hint" id="scroll-hint">
    <div class="scroll-hint-text">👇 Baja para ver la cartelera del día</div>
  </div>
  <div class="evento-card" id="evento-card">
    <div class="evento-badge">
      <span class="star">★</span> Evento exclusivo del día <span class="star">★</span>
    </div>
    <img class="evento-img" id="evento-img" src="" alt="Evento del día">
  </div>

  <div class="date-bar">
    <div class="date-label" id="today-date">Cargando...</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      En vivo
    </div>
  </div>

  <div class="cartelera-card">
    <div class="content-area loading" id="content-display">Cargando cartelera...</div>
    <div class="corner-accent">17</div>
  </div>

  <div class="footer">
    <div>Actualizado diariamente · M17LIV3</div>
    <button class="refresh-btn" onclick="loadContent()">
      ↺ Actualizar
    </button>
  </div>
</main>

<script>
const BIN_ID = '6a2d8241da38895dfebaae93';
const ACCESS_KEY = '$2a$10$9ikO.ZJ.tHgDUL0ddUaO.eNMFAT5S6FGO.Ub6rJKwpIsE/Mr/L2xG';

function setDate() {
  const d = new Date();
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('today-date').textContent =
    `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
}

async function loadContent() {
  const el = document.getElementById('content-display');
  el.className = 'content-area loading';
  el.textContent = 'Cargando cartelera...';

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: {
        'X-Master-Key': ACCESS_KEY,
        'X-Access-Key': ACCESS_KEY
      }
    });
    const data = await res.json();
    const record = data.record || {};
    const texto = record.texto || '';

    if (texto.trim()) {
      el.className = 'content-area';
      el.textContent = texto;
    } else {
      el.className = 'content-area empty';
      el.textContent = '📅 Hoy todavía no se ha publicado la cartelera.\nVuelve más tarde.';
    }

    // Mostrar imagen del evento si existe
    const imagenDia = record.imagen_dia || '';
    if (imagenDia) {
      document.getElementById('evento-img').src = imagenDia;
      document.getElementById('evento-card').className = 'evento-card visible';
      document.getElementById('scroll-hint').className = 'scroll-hint visible';
    } else {
      document.getElementById('evento-card').className = 'evento-card';
      document.getElementById('scroll-hint').className = 'scroll-hint';
    }

    // Registrar visita
    const today = new Date().toISOString().slice(0,10);
    const visits = record.visits || {};
    visits[today] = (visits[today] || 0) + 1;
    record.visits = visits;
    fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': ACCESS_KEY,
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify(record)
    });

  } catch (e) {
    el.className = 'content-area empty';
    el.textContent = '⚠️ No se pudo cargar la cartelera. Inténtalo de nuevo.';
  }
}

setDate();
loadContent();

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
